<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

  <body>
    <script>
      //Write a function fizzBuzz(n) that prints numbers from 1 to n. But for multiples of 3, print "Fizz" instead of the number, for multiples of 5 print "Buzz", and for numbers which are multiples of both 3 and 5, print "FizzBuzz"
      function fizzBuzz(n) {
        for (let i = 1; i <= n; i++) {
          if (i % 3 === 0 && i % 5 === 0) {
            console.log("FizzBuzz");
          } else if (i % 3 === 0) {
            console.log("Fizz");
          } else if (i % 5 === 0) {
            console.log("Buzz");
          } else {
            console.log(i);
          }
        }
      }
      fizzBuzz(15);
      console.log("**********************************");



      //Create a function isPalindrome(str) that returns true if the input string is a palindrome (reads the same forward and backward), otherwise false.

      function isPalindrome(str) {
        let reversed = str.split("").reverse().join("");
        return str === reversed;
      }
      console.log(isPalindrome("madam")); 
      console.log(isPalindrome("hello")); 
      console.log("**********************************");



      //Write a function factorial(num) that returns the factorial of a number using a for loop.
      function factorial(num) {
        let result = 1;

        for (let i = 1; i <= num; i++) {
          result *= i;
        }

        return result;
      }
      console.log(factorial(5)); //
      console.log("**********************************");


      //Write a function isPrime(n) that returns true if n is a prime number, otherwise false.
      function isPrime(n) {
        if (n <= 1) return false;

        for (let i = 2; i < n; i++) {
          if (n % i === 0) {
            return false;
          }
        }

        return true;
      }
      console.log(isPrime(7)); // true
      console.log(isPrime(8)); // false
      console.log("**********************************");


      
      // Write a function countVowels(str) that returns the number of vowels in the string. Consider a, e, i, o, u (case-insensitive) as vowels.
      function countVowels(str) {
        let count = 0;
        let vowels = "aeiouAEIOU";

        for (let i = 0; i < str.length; i++) {
          if (vowels.includes(str[i])) {
            count++;
          }
        }

        return count;
      }
      console.log(countVowels("Hello"));
    </script>
  </body>
