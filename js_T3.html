<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Write a program that uses a loop to calculate the sum of numbers from 1 to 50.
      num = 0;
      for (i = 1; i <= 50; i++) {
        num += i;
      }
      console.log("Sum:", num);
      {
        console.log("************");
      }
      //Using a loop, print the multiplication table of a user given number (e.g., 7) up to 10.

      for (num = 1; num <= 2; num++) {
        for (i = 1; i <= 10; i++) {
          console.log(num + "×" + i + "=" + num * i);
        }
        console.log("*************");
      }

      //Using a loop, find the factorial of a user given number (e.g., 6).
      let factNumber = parseInt(prompt("Enter a number to find factorial:"));
      let factorial = 1;
      for (let i = 1; i <= factNumber; i++) {
        factorial *= i;
      }
      console.log("Factorial of", factNumber, "is:", factorial);
      {
        console.log("*************");
      }
      //Using a loop, count how many even numbers exist between 1 and a user given number and display the count.
      let num2 = +prompt("enter a  even numbers");
      let count = 0;
      for (let i = 1; i <= num2; i++) {
        if (i % 2 == 0) {
          count++;
        }
      }
      console.log("total even numbers", count);

      {
        console.log("*************");
      }
      //Write a program that starts from a user given number (e.g., 20) and counts down to 1, printing each number.

      let startNumber = parseInt(prompt("Enter a number to start countdown:"));
      console.log("Countdown from", startNumber);
      for (let i = startNumber; i >= 1; i--) {
        console.log(i);
      }
    </script>
  </body>
</html>
