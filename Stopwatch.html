<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .StopWatch {
        border: 5px solid black;
        padding: 22px;
        margin: auto;
        border-radius: 15px;
        width: 30%;
        display: flex;
        flex-flow: column nowrap;
        h1 {
          text-align: center;
          border: 2px solid black;
          padding: 8px;
          border-radius: 10px;
        }
      }

      .time {
        display: flex;
        justify-content: space-between;
        margin: 20px;
      }
      .box {
        border: 2px solid black;
        padding: 10px;
        border-radius: 10px;
      }
      .button {
        margin: 5px;
        padding: 8px;
        display: flex;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div class="StopWatch">
      <h1>StopWatch</h1>

      <div class="time">
        <div class="box" id="hours">00</div>
        <div class="box" id="min">00</div>
        <div class="box" id="sec">00</div>
        <div class="box" id="ms">00</div>
      </div>
      <div class="button">
        <button onclick="start()">Start</button>
        <button onclick="Stop()">Stop</button>
        <button onclick="Reset()">Reset</button>
      </div>
    </div>
    <script>
      let hours = 0;
      let min = 0;
      let sec = 0;
      let ms = 0;
      let x = null;

      function StopWatch() {
        if (ms === 99) {
          sec++;
          ms = 0;
        }
        if (sec == 59) {
          min++;
          sec = 0;
        }
        if (min == 59) {
          hours++;
          min = 0;
        }
        document.getElementById("hours").innerHTML = hours
          .toString()
          .padStart(2, "0");
        document.getElementById("min").innerHTML = min
          .toString()
          .padStart(2, "0");
        document.getElementById("sec").innerHTML = sec
          .toString()
          .padStart(2, "0");
        document.getElementById("ms").innerHTML = ms
          .toString()
          .padStart(2, "0");
        ms++;
      }

      function start() {
        if (x == null) x = setInterval(StopWatch, 1);
      }
      function Stop() {
        if (x != null) {
          clearInterval(x);
          x = null;
        }
      }
      function Reset() {
        hours = 0;
        min = 0;
        sec = 0;
        ms = 0;
        if (x != null || x == null) {
          clearInterval(x);
          document.getElementById("hours").innerHTML = hours
            .toString()
            .padStart(2, "0");
          document.getElementById("min").innerHTML = min
            .toString()
            .padStart(2, "0");
          document.getElementById("sec").innerHTML = sec
            .toString()
            .padStart(2, "0");
          document.getElementById("ms").innerHTML = ms
            .toString()
            .padStart(2, "0");
          x = null;
        }
      }
    </script>
  </body>
</html>
